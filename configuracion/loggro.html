<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Loggro</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/loggro.css">
</head>

<body style="display:none">

  <!-- Guardia de autenticación -->
  <script type="module" src="../js/router.js"></script>

  <!-- Guardia de permisos -->
<!-- Header -->
  <script type="module" src="../js/header.js"></script>

  <div class="main">
    <h1>Loggro</h1>
    <p class="descripcion">
      Configura las credenciales de Loggro para habilitar las integraciones.
    </p>

    <form id="loggroForm" class="formulario">
      <div class="campo">
        <label for="loggroEmail">Correo de Loggro</label>
        <p class="ayuda">Ingresa el correo con el que inicias sesión en Loggro.</p>
        <input id="loggroEmail" type="email" required autocomplete="email">
      </div>

      <div class="campo">
        <label for="loggroPassword">Contraseña de Loggro</label>
        <p class="ayuda">Ingresa la contraseña con la que inicias sesión en Loggro.</p>
        <div class="password-wrap">
          <input id="loggroPassword" type="password" required autocomplete="current-password">
          <button type="button" id="toggleLoggroPassword" class="btn-ojito" aria-label="Mostrar contraseña">👁</button>
        </div>
      </div>

      <button type="submit">Guardar credenciales</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script type="module" src="../js/loggro.js"></script>
  <script type="module" src="../js/footer.js"></script>
  <!-- Parche de autenticación para módulos (aislado) -->
  <script type="module" src="../js/module_fix/init.js"></script>
</body>
</html>
