<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Registrar Empleados</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/registro_empleados.css">
</head>
<body style="display:none">

  <script type="module" src="../js/auth_guard.js"></script>

  <script type="module">
    import { guardPage } from "../js/guard_page.js";
    guardPage("registro_empleados");
  </script>

  <script type="module" src="../js/header.js"></script>
  <script type="module" src="../js/registro_empleados.js"></script>

  <div class="main">
    <h1>Registrar empleados</h1>

    <form id="registroEmpleadoForm">
      <label for="nombre">Nombre completo</label>
      <input id="nombre" type="text" required>

      <label for="cedula">Cedula</label>
      <input id="cedula" type="text" inputmode="numeric" pattern="[0-9]*" required>

      <label for="fecha_ingreso">Fecha ingreso</label>
      <input id="fecha_ingreso" type="date" required>

      <label for="email">Correo</label>
      <input id="email" type="email" required>

      <label for="password">Contrasena</label>
      <input id="password" type="password" required>

      <button id="btnRegistrar" type="submit">Registrar empleado</button>

      <div id="status"></div>
    </form>

  </div>

  <script type="module" src="../js/footer.js"></script>
</body>
</html>
