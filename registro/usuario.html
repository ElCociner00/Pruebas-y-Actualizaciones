<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Crear Usuario Administrador</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/usuario.css">
</head>

<body>
  <div class="main">
    <h1>Crear usuario administrador</h1>
    <p class="helper-text">
      Recuerda que estos serán los datos que usarás para ingresar a la plataforma.
    </p>

    <form id="registroUsuario">
      <label for="nombre_visible">Nombre completo</label>
      <input type="text" id="nombre_visible" required autocomplete="name">

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="password">Contraseña</label>
      <div class="password-wrap">
        <input type="password" id="password" required autocomplete="new-password">
        <button type="button" id="togglePassword" class="btn-ojito" aria-label="Mostrar contraseña">👁</button>
      </div>

      <button type="submit">Crear cuenta</button>
    </form>

    <div id="status"></div>
  </div>

  <!-- JS separado -->
  <script type="module" src="../js/usuario.js"></script>
  <script type="module" src="../js/footer.js"></script>
</body>
</html>
