<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXIOMA | Iniciar sesión</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="main login-container">
    <h2>Accede a tu cuenta</h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <button type="submit">Iniciar sesión</button>
      <p id="error-message" style="color: red; margin-top: 10px;"></p>
    </form>

    <p id="status" aria-live="polite"></p>

    <div class="login-extra">
      <a href="./registro/index.html" class="registro-link">
        ¿No tienes cuenta? Regístrate aquí
      </a>
    </div>
  </div>

  <script type="module">
    import { signInWithPassword } from "./js/auth.js";

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error-message");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (errorEl) errorEl.textContent = "";

      const email = String(emailInput?.value || "").trim();
      const password = String(passwordInput?.value || "");

      try {
        await signInWithPassword(email, password);
        window.location.href = "/Plataforma_Restaurantes/dashboard/";
      } catch (error) {
        console.error("Error de inicio de sesión:", error);
        const message = String(error?.message || "");
        if (message.includes("Invalid login credentials")) {
          if (errorEl) errorEl.textContent = "Correo o contraseña incorrectos.";
        } else {
          if (errorEl) errorEl.textContent = "Error de conexión. Inténtalo de nuevo.";
        }
      }
    });
  </script>
  <script type="module" src="js/public_chrome.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
