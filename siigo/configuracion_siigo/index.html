<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Configuracion Siigo</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/configuracion.css">
</head>
<body style="display:none">
  <script type="module" src="../../js/router.js"></script>
<script type="module" src="../../js/header.js"></script>

  <div class="main">
    <h1>Configuracion Siigo</h1>
    <div class="config-section">
      <button class="accordion-toggle"> API's e Integraciones</button>
      <div class="accordion-content">
        <ul class="config-list">
          <li><a href="api_integraciones_siigo.html">Siigo</a></li>
        </ul>
      </div>
    </div>

    <div class="config-section">
      <button class="accordion-toggle"> Operación y Gestión</button>
      <div class="accordion-content">
        <ul class="config-list">
          <li><a href="correo_facturas_siigo.html">Registro de correos</a></li>
          <li><a href="proveedores_siigo.html">Gestionar proveedores</a></li>
        </ul>
      </div>
    </div>

    <div class="config-section">
      <button class="accordion-toggle"> Nómina</button>
      <div class="accordion-content">
        <ul class="config-list">
          <li><a href="../../nomina/">Módulo de nómina</a></li>
          <li><a href="../../configuracion/parametros_nomina.html">Parámetros de nómina</a></li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll(".accordion-toggle").forEach(button => {
      button.addEventListener("click", () => {
        button.classList.toggle("active");
        const content = button.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
      });
    });
  </script>
  <script type="module" src="../../js/footer.js"></script>
  <!-- Parche de autenticación para módulos (aislado) -->
  <script type="module" src="../../js/module_fix/init.js"></script>
</body>
</html>
